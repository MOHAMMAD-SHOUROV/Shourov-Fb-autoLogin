kind = "web"
previewPath = "/"
title = "Shourov FB AutoLogin — Extension Page"
version = "1.0.0"
id = "artifacts/fb-extension-page-v2"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19515

[services.development]
run = "pnpm --filter @workspace/fb-extension-page-v2 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fb-extension-page-v2", "run", "build" ]
publicDir = "artifacts/fb-extension-page-v2/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19515"
BASE_PATH = "/"
