services:
  - type: web
    name: nusaiba-it-center-2478
    env: node
    region: singapore
    plan: free
    buildCommand: npm install -g pnpm@10.26.1 && echo "only-built-dependencies[]=esbuild" >> ~/.npmrc && pnpm install --no-frozen-lockfile && BASE_PATH=/ pnpm --filter @workspace/fb-extension-page run build && pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: BASE_PATH
        value: /
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: nusaiba-it-db
          property: connectionString

databases:
  - name: nusaiba-it-db
    databaseName: nusaiba_it
    plan: free
    region: singapore
